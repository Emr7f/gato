<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Bungee&display=swap');
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; overflow-x: hidden; width: 100%; }

/* ---------- Temas (mundos) ---------- */
body, body[data-tema="gatitos"] {
  --fondo: linear-gradient(160deg, #FFF6EC 0%, #FFE9F3 55%, #EDE7FF 100%);
  --carta: #fff; --texto: #4A3F6B; --suave: #A99CC9; --suave2: #8B7FB0;
  --panel: #F3EEFF; --panelbg: #FBFAFF; --borde: #EDE7FF; --borde2: #E4DCF7;
  --celda: #fff; --pillbg: #FCFAFF; --input: #fff;
  --overlay: linear-gradient(170deg, #7C5CFC, #4A2E85);
  --acento: #FFC93C; --acentotxt: #6B4A00; --acentosombra: #D19E13;
  --sombra: 0 18px 40px rgba(124,92,252,.18), 0 4px 10px rgba(0,0,0,.05);
}
body[data-tema="selva"] {
  --fondo: linear-gradient(170deg, #EAF8DC 0%, #CBE8AF 100%);
  --carta: #fff; --texto: #33691E; --suave: #8DB573; --suave2: #6B9A4E;
  --panel: #EDF7E2; --panelbg: #F7FCF0; --borde: #DDEECB; --borde2: #CBE3B2;
  --celda: #F6FFF0; --pillbg: #FBFFF6; --input: #fff;
  --overlay: linear-gradient(170deg, #1B5E20, #0D3B12);
  --acento: #AEEA00; --acentotxt: #33691E; --acentosombra: #7CB000;
  --sombra: 0 18px 40px rgba(76,175,87,.22), 0 4px 10px rgba(0,0,0,.05);
}
body[data-tema="galaxia"] {
  --fondo: linear-gradient(170deg, #1B1340 0%, #0E0A2A 100%);
  --carta: #241A52; --texto: #EDE7FF; --suave: #8E7CC3; --suave2: #A99CD8;
  --panel: #191140; --panelbg: #1D1548; --borde: #3A2C74; --borde2: #453586;
  --celda: #191140; --pillbg: #1D1548; --input: #191140;
  --overlay: linear-gradient(170deg, #0E0A2AF6, #1B1340F6);
  --acento: #00E5FF; --acentotxt: #00313A; --acentosombra: #00A5B8;
  --sombra: 0 18px 40px rgba(0,0,0,.5), 0 0 30px rgba(108,63,212,.25);
}

body {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: max(18px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
  background: var(--fondo);
  font-family: 'Fredoka', system-ui, -apple-system, sans-serif; color: var(--texto);
}
#app { width: 100%; max-width: 380px; }
.tarjeta {
  background: var(--carta); border-radius: 30px; padding: 18px 18px 14px;
  box-shadow: var(--sombra);
  overflow: hidden; position: relative;
}
.cabecera { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.titulo { display: flex; align-items: center; gap: 9px; }
.gatito { font-size: 32px; line-height: 1; animation: wiggle 2.4s ease-in-out infinite; display: inline-block; }
.titulo h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: .5px; }
.sub { margin: 0; font-size: 12px; font-weight: 500; color: var(--suave); }
.icono { border: none; background: var(--panel); color: var(--texto); width: 42px; height: 42px; border-radius: 13px; font-size: 19px; cursor: pointer; }
.icono:active { transform: scale(.9); }
.cab-botones { display: flex; gap: 6px; }
.leyenda { font-size: 11px; color: var(--suave); font-weight: 600; margin-bottom: 8px; }
.tfila { display: grid; grid-template-columns: 1fr 36px 36px 36px 36px; align-items: center; padding: 7px 6px; border-radius: 10px; font-size: 14px; font-weight: 600; }
.tfila:nth-child(odd) { background: var(--celda); }
.tfila span { text-align: center; }
.tfila .tnom { text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tfila.tcab { font-size: 13px; padding: 2px 6px; background: none; }
.vacio { text-align: center; font-size: 13px; color: var(--suave); font-weight: 600; padding: 10px 0; }

.modo { display: flex; gap: 6px; background: var(--panel); padding: 4px; border-radius: 14px; margin-bottom: 8px; }
.modo button { flex: 1; border: none; background: transparent; padding: 9px 6px; border-radius: 11px; font-family: inherit; font-size: 13.5px; font-weight: 600; color: var(--suave2); cursor: pointer; }
.modo button.on { background: var(--celda); color: var(--texto); box-shadow: 0 2px 6px rgba(0,0,0,.12); }

.dif { display: flex; gap: 6px; margin-bottom: 10px; }
.dif button { flex: 1; border: 2px solid var(--borde); background: var(--carta); padding: 7px; border-radius: 11px; font-family: inherit; font-size: 12.5px; font-weight: 600; color: var(--suave); cursor: pointer; }
.dif button.on { border-color: var(--acento); color: var(--texto); }
.serieRow { align-items: center; }
.serieLab { font-size: 12px; font-weight: 700; color: var(--suave); padding: 0 3px; white-space: nowrap; }
.serieRow button { padding: 7px 4px; }
.serietxt { text-align: center; font-size: 12px; font-weight: 600; color: var(--suave2); margin: -3px 0 10px; }

.marcador { display: flex; gap: 7px; margin-bottom: 10px; }
.pill { flex: 1; background: var(--pillbg); border: 2.5px solid var(--borde); border-radius: 15px; padding: 7px 5px; text-align: center; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.pill.emp { flex: .9; }
.pill-etq { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pill-etq.gris { color: var(--suave); font-size: 11px; }
.pill-num { font-size: 22px; font-weight: 700; color: var(--texto); }

.estado { text-align: center; font-size: 20px; font-weight: 600; margin: 2px 0 12px; min-height: 28px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
.estado b { font-weight: 700; }

.tabla { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 8px; border-radius: 22px; margin-bottom: 14px; transition: background .3s; overflow: hidden; }
.tabla.shake { animation: shakeK .45s ease; }
.celda { aspect-ratio: 1/1; background: var(--celda); border: none; border-radius: 15px; cursor: pointer; padding: 12%; display: flex; align-items: center; justify-content: center; overflow: hidden; min-width: 0; }
.celda:active:not(:disabled) { transform: scale(.94); }
.marca { width: 100%; height: 100%; }
.marca.nueva { animation: flipin .4s cubic-bezier(.34,1.5,.64,1); }
.marca.emoji { display: flex; align-items: center; justify-content: center; font-size: clamp(30px, 12.5vw, 52px); line-height: 1; }
.marca.gana { animation: latido .8s ease-in-out infinite; }
@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
@keyframes flipin { from { transform: rotateY(90deg) scale(.5); opacity: 0; } to { transform: rotateY(0) scale(1); opacity: 1; } }
@keyframes latido { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
@keyframes shakeK { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-7px); } 40% { transform: translateX(7px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
@keyframes wiggle { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
@keyframes bobber { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes rays { to { transform: rotate(360deg); } }
@keyframes dropin { 0% { transform: translateY(-90px) scale(.4); opacity: 0; } 60% { transform: translateY(8px) scale(1.1); } 100% { transform: translateY(0) scale(1); opacity: 1; } }
@keyframes bounceIn { 0% { transform: scale(0); } 60% { transform: scale(1.15); } 100% { transform: scale(1); } }
@keyframes pulseBtn { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
@keyframes fxfly { to { transform: translate(var(--dx), var(--dy)) scale(.1); opacity: 0; } }

.acciones { display: flex; gap: 7px; }
.btn { border: none; border-radius: 15px; padding: 13px 6px; font-family: inherit; font-size: 14.5px; font-weight: 600; cursor: pointer; min-width: 0; }
.btn:active { transform: scale(.96); }
.btn-jugar { flex: 1.6; background: #6BCB77; color: #fff; box-shadow: 0 5px 0 #4CAF57; }
.btn-jugar:active { box-shadow: 0 2px 0 #4CAF57; }
.btn-sec { flex: 1; background: #FFE3B3; color: #A0691C; box-shadow: 0 5px 0 #F0C67E; font-size: 13px; }
.btn-sec:active { box-shadow: 0 2px 0 #F0C67E; }
.btn-sec.jug { background: #D8EAFF; color: #1E5DAA; box-shadow: 0 5px 0 #AECDF5; }
.btn-sec.jug:active { box-shadow: 0 2px 0 #AECDF5; }

.panel { margin-top: 11px; background: var(--panelbg); border: 2px solid var(--borde); border-radius: 18px; padding: 13px; animation: baja .22s ease; }
@keyframes baja { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.panel h3 { margin: 0 0 9px; font-size: 13px; font-weight: 700; color: var(--suave2); }
.panel h4 { margin: 10px 0 7px; font-size: 12px; font-weight: 700; color: var(--suave); }
.selq { display: flex; gap: 6px; margin-bottom: 11px; flex-wrap: wrap; }
.chip { flex: 1; min-width: 88px; border: 2px solid var(--borde2); background: var(--carta); color: var(--suave2); border-radius: 11px; padding: 8px 5px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; }
.temas { display: flex; gap: 6px; margin-bottom: 4px; }
.tema { flex: 1; border: 2px solid var(--borde2); background: var(--carta); color: var(--suave2); border-radius: 13px; padding: 9px 4px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; gap: 2px; align-items: center; }
.tema .tico { font-size: 22px; line-height: 1; }
.tema.on { border-color: var(--acento); color: var(--texto); box-shadow: 0 0 0 2px var(--acento) inset; }
.swatches { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 9px; }
.swatch { aspect-ratio: 1/1; border-radius: 50%; border: 3px solid var(--carta); cursor: pointer; box-shadow: 0 0 0 2px var(--borde2); }
.swatch:active { transform: scale(.9); }
.swatch.sel { box-shadow: 0 0 0 3px var(--texto); transform: scale(1.08); }
.fichas { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; margin-bottom: 4px; }
.ficha { aspect-ratio: 1/1; border-radius: 14px; border: 2px solid var(--borde2); background: var(--celda); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; min-width: 0; overflow: hidden; }
.ficha.sel { border-color: var(--acento); box-shadow: 0 0 0 2px var(--acento); transform: scale(1.06); }
.ficha.usada { opacity: .3; }
.ficha svg { width: 60%; height: 60%; }
.ficha.pokeb img { width: 88%; height: 88%; max-width: 100%; object-fit: contain; pointer-events: none; }
.pokeinfo { margin-top: 10px; background: var(--celda); border: 2px solid var(--borde2); border-radius: 12px; padding: 10px 12px; font-size: 12.5px; color: var(--suave2); line-height: 1.5; }
.pokeinfo b { color: var(--texto); }
.pokeinfo .tit { font-size: 14px; margin-bottom: 4px; }
.marca.poke { object-fit: contain; }
.poke-fallo { display: flex; align-items: center; justify-content: center; font-size: clamp(10px, 3.4vw, 14px); font-weight: 700; color: var(--texto); text-align: center; line-height: 1.1; padding: 4px; overflow: hidden; }
.mini-fallo { font-size: 11px; font-weight: 700; color: var(--suave2); }
.mini { width: 19px; height: 19px; object-fit: contain; vertical-align: -4px; }

.agregar { display: flex; gap: 6px; margin-bottom: 12px; }
.agregar input { flex: 1; min-width: 0; border: 2px solid var(--borde2); border-radius: 11px; padding: 10px 12px; font-family: inherit; font-size: 15px; color: var(--texto); background: var(--input); outline: none; }
.agregar input:focus { border-color: var(--acento); }
.agregar button { border: none; background: #6BCB77; color: #fff; border-radius: 11px; padding: 0 16px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
.roster { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.namechip { display: inline-flex; align-items: center; gap: 6px; background: var(--celda); border: 2px solid var(--borde2); border-radius: 20px; padding: 5px 6px 5px 12px; font-size: 13px; font-weight: 600; color: var(--texto); }
.namechip .x { width: 20px; height: 20px; border-radius: 50%; background: #FFE0E0; color: #E24; border: none; font-size: 13px; line-height: 1; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
.asig { margin-bottom: 10px; }
.asig .lab { font-size: 12.5px; font-weight: 700; margin-bottom: 6px; }
.asig .fila { display: flex; flex-wrap: wrap; gap: 6px; }
.pick { border: 2px solid var(--borde2); background: var(--carta); color: var(--suave2); border-radius: 20px; padding: 6px 13px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
.pick.on { color: #fff; }

.pie { text-align: center; margin-top: 11px; }
.link { background: none; border: none; color: var(--suave); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; padding: 4px 8px; }
.link.fuerte { color: #FF5A5F; font-weight: 700; }
.confirmar { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; font-size: 13px; color: var(--suave2); }

/* ---------- Pantalla de victoria ---------- */
#velo { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center; padding: 20px; background: var(--overlay); overflow: hidden; }
#velo.abierto { display: flex; animation: baja .3s ease; }
.rayos { position: absolute; width: 150vmax; height: 150vmax; background: repeating-conic-gradient(rgba(255,255,255,.09) 0 14deg, transparent 14deg 28deg); border-radius: 50%; animation: rays 16s linear infinite; }
.vcontenido { position: relative; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; max-width: 340px; width: 100%; }
.vmedalla { font-size: 40px; animation: dropin .6s cubic-bezier(.34,1.4,.64,1); }
.vficha { animation: bobber 1.2s ease-in-out infinite; }
.vficha .emoji { font-size: 92px; line-height: 1; }
.vficha img { width: 130px; height: 130px; object-fit: contain; }
.vficha svg { width: 100px; height: 100px; }
.vtitulo { font-family: 'Bungee', 'Fredoka', sans-serif; font-size: 30px; color: var(--acento); animation: bounceIn .5s .1s cubic-bezier(.34,1.5,.64,1) both; text-shadow: 0 0 18px rgba(255,255,255,.25); }
.vnombre { font-size: 17px; font-weight: 600; color: rgba(255,255,255,.85); }
.vbotones { display: flex; gap: 8px; margin-top: 16px; width: 100%; }
.vbtn { flex: 1.5; border: none; cursor: pointer; background: var(--acento); color: var(--acentotxt); font-family: inherit; font-size: 17px; font-weight: 600; padding: 14px 10px; border-radius: 16px; box-shadow: 0 5px 0 var(--acentosombra); animation: pulseBtn 1.8s ease-in-out infinite; }
.vbtn:active { box-shadow: 0 2px 0 var(--acentosombra); transform: scale(.97); }
.vbtn.suave { flex: 1; background: rgba(255,255,255,.14); color: #fff; box-shadow: none; animation: none; font-size: 14px; }

#confeti { position: fixed; inset: 0; pointer-events: none; z-index: 60; overflow: hidden; }
.pieza { position: absolute; top: -20px; border-radius: 2px; animation: caer linear forwards; }
.chispa { position: absolute; border-radius: 50%; animation: fxfly cubic-bezier(.1,.8,.3,1) forwards; }
.estrellita { position: absolute; line-height: 1; animation: fxfly cubic-bezier(.1,.8,.3,1) forwards; }
@keyframes caer { 0% { transform: translateY(-20px) rotate(0); opacity: 1; } 100% { transform: translateY(105vh) rotate(720deg); opacity: .9; } }
@media (prefers-reduced-motion: reduce) { .marca, .panel, .pieza, .chispa, .estrellita, .rayos, .gatito { animation: none !important; } }
</style>

<script>
"use strict";

// ---------- Almacenamiento en el teléfono ----------
async function cargar(key) {
  try {
    if (window.storage) { var r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }
    var v = localStorage.getItem(key); return v ? JSON.parse(v) : null;
  } catch (e) { return null; }
}
async function guardar(key, value) {
  try {
    if (window.storage) { await window.storage.set(key, JSON.stringify(value)); return; }
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {}
}
var K_MARC = "xyo:marcador", K_COL = "xyo:colores", K_CFG = "xyo:config", K_FICH = "xyo:fichas", K_HIST = "xyo:historial", K_TEMA = "xyo:tema";

// ---------- Sonidos ----------
var AC = window.AudioContext || window.webkitAudioContext, ctx = null;
function asegurar() { if (!ctx && AC) ctx = new AC(); if (ctx && ctx.state === "suspended") ctx.resume(); return ctx; }
function tono(f, dur, tipo, ini, vol) {
  var c = asegurar(); if (!c) return;
  var t = c.currentTime + (ini || 0), o = c.createOscillator(), g = c.createGain();
  o.type = tipo || "sine"; o.frequency.setValueAtTime(f, t);
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(vol || .18, t + .012);
  g.gain.exponentialRampToValueAtTime(.0001, t + dur);
  o.connect(g); g.connect(c.destination); o.start(t); o.stop(t + dur + .02);
}
function sTap(m) { if (!S.silencio) tono(m === "X" ? 620 : 440, .14, "triangle", 0, .16); }
function sGanar() { if (S.silencio) return; [523, 659, 784, 1047].forEach(function (f, i) { tono(f, .28, "triangle", i * .11, .2); }); }
function sEmpate() { if (S.silencio) return; tono(392, .2, "sine", 0, .15); tono(311, .28, "sine", .14, .15); }
function sCampeon() { if (S.silencio) return; [523, 659, 784, 1047, 784, 1047, 1319].forEach(function (f, i) { tono(f, .3, "triangle", i * .13, .2); }); }
function sClick() { if (!S.silencio) tono(700, .08, "sine", 0, .1); }

// ---------- Temas (mundos) ----------
var TEMAS = {

};

// ---------- Estado ----------
var PALETA = ["#FF5A5F","#FF8A3D","#FFC93C","#6BCB77","#2D9CDB","#4D5DFB","#7C5CFC","#E84393","#8D6E63","#2D3436"];
var EMOJIS = ["\uD83D\uDC22","\uD83D\uDC20","\uD83D\uDC31","\uD83D\uDC2D","\uD83D\uDC18","\uD83D\uDC36","\uD83E\uDD81","\uD83D\uDC38","\uD83E\uDD84","\uD83D\uDC3C","\uD83E\uDD96","\uD83D\uDC19","\uD83D\uDC24","\u2B50","\u2764\uFE0F","\uD83D\uDC0A","\uD83D\uDC7E","\uD83E\uDD16"];
// Los 21 Pokémon más famosos (uso privado): [id, nombre, carta icónica, historia]
var POKES = [
  [25, "Pikachu", "Pikachu Illustrator (1998) — la carta m\u00E1s cara de la historia: una lleg\u00F3 a venderse por m\u00E1s de 5 millones de d\u00F3lares", "La mascota de Pok\u00E9mon. Guarda electricidad en sus mejillas y la suelta cuando se emociona o se asusta."],
  [6, "Charizard", "Charizard Base Set 1\u00AA edici\u00F3n (1999) — el \u201Csanto grial\u201D de los coleccionistas", "Su fuego puede derretir rocas. Vuela buscando rivales fuertes, pero nunca le lanza fuego a alguien m\u00E1s d\u00E9bil que \u00E9l."],

        for (var pi = 0; pi < POKES.length; pi++) {
          if (POKES[pi][0] === idSel) {
            infoHTML = '<div class="pokeinfo"><div class="tit"><b>' + POKES[pi][1] + '</b></div>' +
              '<div>\uD83C\uDCCF <b>Carta ic\u00F3nica:</b> ' + POKES[pi][2] + "</div>" +
              '<div>\uD83D\uDCD6 ' + POKES[pi][3] + "</div></div>";
            break;
          }
        }
      }
      fichasHTML = "<h4>Elige la ficha</h4><div class=\"fichas\">" + opciones + "</div><h4>Pok\u00E9mon</h4><div class=\"fichas\">" + pokesHTML + "</div>" + infoHTML;
    }

    var sw = PALETA.map(function (col) {
      return '<button class="swatch' + (S.colores[S.editColor] === col ? " sel" : "") + '" data-accion="color" data-val="' + col + '" style="background:' + col + '"></button>';
    }).join("");
    panelHTML = '<div class="panel"><h3>\uD83C\uDF0D Elige el mundo</h3><div class="temas">' + temasHTML + "</div>" +
      '<h3 style="margin-top:12px">\uD83C\uDFA8 Personalizar</h3><div class="selq">' + chips + "</div>" + fichasHTML + "<h4>Elige el color</h4><div class=\"swatches\">" + sw + "</div></div>";
  } else if (S.panel === "jugadores") {
    var roster = S.jugadores.map(function (n) {
      return '<span class="namechip">' + esc(n) + '<button class="x" data-accion="delname" data-val="' + esc(n) + '">\u00D7</button></span>';
    }).join("");
    var pickX = S.jugadores.map(function (n) {
      var on = S.nombreX === n;
      return '<button class="pick' + (on ? " on" : "") + '" data-accion="asignar" data-role="X" data-val="' + esc(n) + '"' + (on ? ' style="background:' + S.colores.x + ';border-color:' + S.colores.x + '"' : "") + ">" + esc(n) + "</button>";
    }).join("");
    var asigO;
    if (S.modo === "compu") {
      asigO = '<div class="asig"><div class="lab" style="color:' + S.colores.o + '">Juega con ' + (esClasica(S.fichas.o) ? "O" : S.fichas.o) + '</div><div class="fila"><button class="pick on" style="background:' + S.colores.o + ';border-color:' + S.colores.o + '">\uD83E\uDD16 La compu</button></div></div>';
    } else {
      var pickO = S.jugadores.map(function (n) {
        var on = S.nombreO === n;
        return '<button class="pick' + (on ? " on" : "") + '" data-accion="asignar" data-role="O" data-val="' + esc(n) + '"' + (on ? ' style="background:' + S.colores.o + ';border-color:' + S.colores.o + '"' : "") + ">" + esc(n) + "</button>";
      }).join("");
      asigO = '<div class="asig"><div class="lab" style="color:' + S.colores.o + '">Juega con ' + (esClasica(S.fichas.o) ? "O" : S.fichas.o) + '</div><div class="fila">' + pickO + "</div></div>";
    }
    panelHTML = '<div class="panel"><h3>\uD83D\uDC65 Jugadores</h3>' +
      '<div class="agregar"><input id="nombreInput" type="text" placeholder="Escribe un nombre" maxlength="14" value="' + esc(S.nuevoNombre) + '" /><button data-accion="agregar">Agregar</button></div>' +
      '<div class="roster">' + roster + "</div>" +
      '<div class="asig"><div class="lab" style="color:' + S.colores.x + '">Juega con ' + (esClasica(S.fichas.x) ? "X" : S.fichas.x) + '</div><div class="fila">' + pickX + "</div></div>" +
      asigO + "</div>";
  } else if (S.panel === "tabla") {
    var nombres = Object.keys(S.hist);
    var filas;
    if (!nombres.length) {
      filas = '<div class="vacio">Todav\u00EDa no hay partidas guardadas. \u00A1Jueguen la primera!</div>';
    } else {
      nombres.sort(function (a, b) { return S.hist[b].g - S.hist[a].g; });
      var medallas = ["\uD83E\uDD47", "\uD83E\uDD48", "\uD83E\uDD49"];
      filas = '<div class="tfila tcab"><span class="tnom"></span><span>\uD83C\uDFC6</span><span>\uD83E\uDD1D</span><span>\uD83D\uDE22</span><span>\uD83D\uDC51</span></div>' +
        nombres.map(function (n, i) {
          var h = S.hist[n];
          return '<div class="tfila"><span class="tnom">' + (medallas[i] || "\u00A0\u00A0") + " " + esc(n) + "</span><span>" + h.g + "</span><span>" + h.e + "</span><span>" + h.p + "</span><span>" + (h.c || 0) + "</span></div>";
        }).join("");
    }
    var borrarHistBtn;
    if (S.confirmar === "hist") {
      borrarHistBtn = '<div class="confirmar"><span>\u00BFBorrar todo el historial?</span><button class="link fuerte" data-accion="histsi">S\u00ED</button><button class="link" data-accion="cancelar">No</button></div>';
    } else {
      borrarHistBtn = '<div style="text-align:center"><button class="link" data-accion="histq">Borrar historial</button></div>';
    }
    panelHTML = '<div class="panel"><h3>\uD83C\uDFC6 Tabla de campeones</h3><div class="leyenda">\uD83C\uDFC6 ganadas \u00B7 \uD83E\uDD1D empates \u00B7 \uD83D\uDE22 perdidas \u00B7 \uD83D\uDC51 series ganadas</div>' + filas + borrarHistBtn + "</div>";
  }

  var difHTML = S.modo === "compu"
    ? '<div class="dif"><button data-accion="dif" data-val="facil" class="' + (S.dificultad === "facil" ? "on" : "") + '">\uD83D\uDE0A F\u00E1cil</button><button data-accion="dif" data-val="dificil" class="' + (S.dificultad === "dificil" ? "on" : "") + '">\uD83D\uDD25 Dif\u00EDcil</button></div>'
    : "";

  var serieOps = [[0, "Libre"], [3, "3"], [5, "5"], [7, "7"], [9, "9"], [13, "13"]];
  var serieHTML = '<div class="dif serieRow"><span class="serieLab">\uD83C\uDFC6 Serie</span>' + serieOps.map(function (op) {
    return '<button data-accion="serie" data-val="' + op[0] + '" class="' + (S.serie === op[0] ? "on" : "") + '">' + op[1] + "</button>";
  }).join("") + "</div>";
  if (S.serie) serieHTML += '<div class="serietxt">Mejor de ' + S.serie + ": gana el primero en llegar a " + metaSerie() + "</div>";

  var pieHTML;
  if (S.confirmar === "cero") {
    pieHTML = '<div class="confirmar"><span>\u00BFEmpezar todo de cero? El marcador se borra.</span><button class="link fuerte" data-accion="cerosi">S\u00ED</button><button class="link" data-accion="cancelar">No</button></div>';
  } else {
    pieHTML = '<button class="link" data-accion="ceroq">\uD83D\uDD04 Empezar de cero</button>';
  }

  var tm = TEMAS[S.tema];
  document.getElementById("app").innerHTML =
    '<div class="tarjeta">' +
      '<div class="cabecera"><div class="titulo"><span class="gatito">' + tm.icono + '</span><div><h1>X y O</h1><p class="sub">' + tm.sub + '</p></div></div>' +
      '<div class="cab-botones"><button class="icono" data-accion="panel" data-val="tabla">\uD83C\uDFC6</button><button class="icono" data-accion="mute">' + (S.silencio ? "\uD83D\uDD07" : "\uD83D\uDD0A") + "</button></div></div>" +
      '<div class="modo"><button data-accion="modo" data-val="dos" class="' + (S.modo === "dos" ? "on" : "") + '">\uD83D\uDC65 2 jugadores</button><button data-accion="modo" data-val="compu" class="' + (S.modo === "compu" ? "on" : "") + '">\uD83E\uDD16 vs. la compu</button></div>' +
      difHTML + serieHTML +
      '<div class="marcador">' +
        '<div class="pill" style="border-color:' + S.colores.x + '"><span class="pill-etq" style="color:' + S.colores.x + '">' + etiquetaDe("X") + '</span><span class="pill-num">' + S.marcador.X + "</span></div>" +
        '<div class="pill emp"><span class="pill-etq gris">Empates</span><span class="pill-num">' + S.marcador.empates + "</span></div>" +
        '<div class="pill" style="border-color:' + S.colores.o + '"><span class="pill-etq" style="color:' + S.colores.o + '">' + etiquetaDe("O") + '</span><span class="pill-num">' + S.marcador.O + "</span></div>" +
      "</div>" +
      '<div class="estado">' + estadoHTML + "</div>" +
      '<div class="tabla' + (S.sacudir ? " shake" : "") + '" style="background:' + S.colores.tabla + '">' + celdas + "</div>" +
      '<div class="acciones">' +
        '<button class="btn btn-jugar" data-accion="nueva">' + (S.campeon ? "\uD83C\uDFC6 Nueva serie" : (S.resultado ? "\uD83C\uDFAE Jugar otra vez" : "\u21BB Reiniciar")) + "</button>" +
        '<button class="btn btn-sec" data-accion="panel" data-val="colores">\uD83C\uDFA8 Fichas</button>' +
        '<button class="btn btn-sec jug" data-accion="panel" data-val="jugadores">\uD83D\uDC65 Nombres</button>' +
      "</div>" +
      panelHTML +
      '<div class="pie">' + pieHTML + "</div>" +
    "</div>";

  // ---- Pantalla de victoria / campeón ----
  var velo = document.getElementById("velo");
  if (S.velo && S.resultado && S.resultado.jugador !== "empate") {
    var g = S.campeon || S.resultado.jugador;
    var esCamp = S.velo === "campeon";
    velo.innerHTML =
      '<div class="rayos"></div>' +
      '<div class="vcontenido">' +
        '<div class="vmedalla">' + (esCamp ? "\uD83C\uDFC6" : "\uD83C\uDFC5") + "</div>" +
        '<div class="vficha">' + fichaGrandeHTML(g) + "</div>" +
        '<div class="vtitulo">' + (esCamp ? "\u00A1CAMPE\u00D3N!" : "\u00A1VICTORIA!") + "</div>" +
        '<div class="vnombre">' + esc(nombreDe(g)) + (esCamp ? " gan\u00F3 la serie" : " gan\u00F3 la ronda") + "</div>" +
        '<div class="vbotones">' +
          '<button class="vbtn" data-accion="' + (esCamp ? "nueva" : "revancha") + '">' + (esCamp ? "\uD83C\uDFC6 Nueva serie" : "\u2694\uFE0F Revancha") + "</button>" +
          '<button class="vbtn suave" data-accion="cerrarvelo">Ver tablero</button>' +
        "</div>" +
      "</div>";
    velo.className = "abierto";
  } else {
    velo.className = ""; velo.innerHTML = "";
  }
}

// ---------- Eventos ----------
var appEl = document.getElementById("app");
function manejar(e) {
  var el = e.target.closest("[data-accion]"); if (!el) return;
  asegurar();
  var a = el.dataset.accion, val = el.dataset.val, role = el.dataset.role;
  if (a === "celda") jugarCelda(parseInt(el.dataset.i, 10));
  else if (a === "nueva") nuevaRonda();
  else if (a === "revancha") nuevaRonda();
  else if (a === "cerrarvelo") { S.velo = null; sClick(); render(); }
  else if (a === "mute") { S.silencio = !S.silencio; render(); }
  else if (a === "panel") { S.panel = S.panel === val ? null : val; sClick(); render(); }
  else if (a === "tema") setTema(val);
  else if (a === "editcolor") { S.editColor = val; render(); }
  else if (a === "color") { S.colores[S.editColor] = val; guardar(K_COL, S.colores); sClick(); render(); }
  else if (a === "ficha") setFicha(val);
  else if (a === "modo") setModo(val);
  else if (a === "dif") { S.dificultad = val; guardarCfg(); render(); }
  else if (a === "serie") { S.serie = parseInt(val, 10) || 0; guardarCfg(); sClick(); render(); }
  else if (a === "agregar") agregarNombre();
  else if (a === "delname") borrarNombre(val);
  else if (a === "asignar") asignar(role, val);
  else if (a === "ceroq") { S.confirmar = "cero"; render(); }
  else if (a === "cerosi") empezarDeCero();
  else if (a === "histq") { S.confirmar = "hist"; render(); }
  else if (a === "histsi") { S.hist = {}; S.confirmar = null; guardar(K_HIST, S.hist); sClick(); render(); }
  else if (a === "cancelar") { S.confirmar = null; render(); }
}
appEl.addEventListener("click", manejar);
document.getElementById("velo").addEventListener("click", manejar);
appEl.addEventListener("input", function (e) {
  if (e.target && e.target.id === "nombreInput") S.nuevoNombre = e.target.value;
});
appEl.addEventListener("keydown", function (e) {
  if (e.target && e.target.id === "nombreInput" && e.key === "Enter") agregarNombre();
});

// ---------- Inicio ----------
(async function () {
  var t = await cargar(K_TEMA); if (t && TEMAS[t]) { S.tema = t; document.body.dataset.tema = t; }
  var m = await cargar(K_MARC); if (m && typeof m.X === "number") S.marcador = m;
  var c = await cargar(K_COL); if (c && c.x) S.colores = c;
  var f = await cargar(K_FICH); if (f && f.x) S.fichas = f;
  var h = await cargar(K_HIST); if (h && typeof h === "object") S.hist = h;
  var cfg = await cargar(K_CFG);
  if (cfg) {
    if (cfg.modo) S.modo = cfg.modo;
    if (cfg.dificultad) S.dificultad = cfg.dificultad;
    if (Array.isArray(cfg.jugadores) && cfg.jugadores.length) S.jugadores = cfg.jugadores;
    if (cfg.nombreX) S.nombreX = cfg.nombreX;
    if (cfg.nombreO) S.nombreO = cfg.nombreO;
    if (typeof cfg.serie === "number") S.serie = cfg.serie;
    if (S.jugadores.indexOf(S.nombreX) < 0) S.nombreX = S.jugadores[0];
    if (S.jugadores.indexOf(S.nombreO) < 0) S.nombreO = S.jugadores[S.jugadores.length > 1 ? 1 : 0];
  }
  render();
})();
</script>
</body>
</html>
